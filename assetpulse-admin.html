<script>
const DCATS=[{icon:'💉',name:'IV Pump'},{icon:'🔬',name:'Bladder Scanner'},{icon:'👁',name:'Visual Acuity Kit'},{icon:'🌡',name:'Thermometer'},{icon:'🩹',name:'Wound Care Kit'},{icon:'💨',name:'Oxygen Saturation Monitor'},{icon:'🫀',name:'Blood Pressure Monitor'},{icon:'💊',name:'Medication Infuser'},{icon:'🩺',name:'Stethoscope'},{icon:'📱',name:'Mobile Device'},{icon:'💻',name:'IT Equipment'},{icon:'📦',name:'Other'}];
const KEYS={eq:'assetpulse_v1_equipment',ep:'assetpulse_v1_episodes',sf:'assetpulse_v1_staff',ct:'assetpulse_v1_categories',ac:'assetpulse_v1_activity'};
let DB={eq:[],ep:[],sf:[],ct:DCATS,ac:[]};
let CCF='all';
const AIH=[];
let txToday=0;

// ── Firebase storage adapters ──
async function SG(k){ return await window.FBget(k); }
async function SS(k,v){ return await window.FBset(k,v); }
async function addAct(msg,color='var(--ac)'){
  try{
    const l=await SG(KEYS.ac)||[];
    l.unshift({msg,color,ts:new Date().toISOString()});
    if(l.length>100)l.pop();
    await SS(KEYS.ac,l);
    DB.ac=l;
  }catch(e){console.warn('addAct error',e);}
}

async function boot(){
  // Wait for Firebase module to be ready
  await new Promise(resolve => {
    if(window.FBget) return resolve();
    document.addEventListener('fb-ready', resolve, {once:true});
    setTimeout(resolve, 4000); // fallback timeout
  });
  document.getElementById('lmsg').textContent='Loading equipment register…';
  DB.eq=await SG(KEYS.eq)||[];
  DB.ep=await SG(KEYS.ep)||[];
  DB.sf=await SG(KEYS.sf)||[];
  DB.ct=await SG(KEYS.ct)||DCATS;
  DB.ac=await SG(KEYS.ac)||[];
  document.getElementById('ls').style.display='none';
  RA();
  // Live Firebase listeners — update DB and re-render instantly when Field app writes
  window.FBlisten(KEYS.eq, data=>{ if(data){DB.eq=data;RS();renderDC();if(document.getElementById('page-equipment').classList.contains('active'))filterEq();} });
  window.FBlisten(KEYS.ep, data=>{ if(data){DB.ep=data;RS();if(document.getElementById('page-clinical').classList.contains('active'))filterEp(CCF,null);document.getElementById('synclbl').textContent='Synced ✓';setTimeout(()=>document.getElementById('synclbl').textContent='Live',1800);} });
  window.FBlisten(KEYS.ac, data=>{ if(data){DB.ac=data;renderDA();} });
  window.FBlisten(KEYS.sf, data=>{ if(data){DB.sf=data;renderSF();popSfDd();} });
}

async function syncNow(){DB.eq=await SG(KEYS.eq)||DB.eq;DB.ep=await SG(KEYS.ep)||DB.ep;DB.ac=await SG(KEYS.ac)||DB.ac;DB.sf=await SG(KEYS.sf)||DB.sf;RA();showToast('Synced with Firebase','info');}

function RA(){RS();renderDA();renderDC();renderCPills();filterEp('all',null);filterEq();renderSF();renderCatS();popSfDd();popCatDd();}

function RS(){
  const tot=DB.eq.length,av=DB.eq.filter(e=>e.status==='Available').length,mt=DB.eq.filter(e=>e.status==='Maintenance').length;
  const td=new Date().toISOString().split('T')[0];
  DB.ep.forEach(e=>{if(e.status==='active'&&e.expectedReturn&&e.expectedReturn<td)e.status='overdue';});
  const act=DB.ep.filter(e=>e.status==='active'||e.status==='overdue'),ov=DB.ep.filter(e=>e.status==='overdue').length,ret=DB.ep.filter(e=>e.status==='returned').length;
  S('st-total',tot);S('st-avail',av);S('st-maint',mt);S('st-sc',txToday);S('st-tt',tot+' items registered');S('st-mt',mt>0?mt+' need attention':'All clear');
  S('cdb-f',act.length);S('cdb-o',ov);S('cl-f',act.length);S('cl-o',ov);S('cl-r',ret);
}

function renderDA(){
  const list=DB.ac.slice(0,8);
  if(!list.length){document.getElementById('dash-act').innerHTML='<div class="empty"><div class="empty-icon">📋</div><div class="empty-msg">No activity yet. Issue equipment or register items to see a live feed here.</div></div>';return;}
  document.getElementById('dash-act').innerHTML=list.map(a=>`<div class="actitem"><div class="acdot" style="background:${a.color}"></div><div class="actxt">${a.msg}<div class="actm">${relT(a.ts)}</div></div></div>`).join('');
}
function renderDC(){
  if(!DB.eq.length){document.getElementById('dash-cats').innerHTML='<div style="font-size:.73rem;color:var(--mu)">No equipment registered yet. Go to Equipment tab to add items.</div>';return;}
  const cnt={};DB.eq.forEach(e=>{cnt[e.cat]=(cnt[e.cat]||0)+1;});
  const tot=DB.eq.length,colors=['var(--cl)','var(--ac)','var(--wn)','var(--ac3)','#f472b6','#60a5fa','var(--ac2)','#fb923c'];
  document.getElementById('dash-cats').innerHTML=Object.entries(cnt).map(([cat,c],i)=>{
    const f=DB.ct.find(x=>x.name===cat)||{icon:'📦'};
    return `<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:2px"><span style="font-size:.75rem">${f.icon} ${cat}</span><span class="mono">${c}</span></div><div class="prog"><div class="pf" style="width:${(c/tot*100).toFixed(0)}%;background:${colors[i%colors.length]}"></div></div></div>`;
  }).join('');
}

function renderCPills(){
  const used=new Set();
  DB.ep.forEach(e=>e.equipment.forEach(id=>{const eq=DB.eq.find(x=>x.id===id);if(eq)used.add(eq.cat);}));
  const el=document.getElementById('cl-pills');
  [...el.querySelectorAll('.pll')].slice(1).forEach(p=>p.remove());
  used.forEach(cat=>{const c=DB.ct.find(x=>x.name===cat)||{icon:'📦'};const d=document.createElement('div');d.className='pll';d.textContent=`${c.icon} ${cat}`;d.onclick=function(){filterEp(cat,this);};el.appendChild(d);});
}

function filterEp(cat,pel){
  CCF=cat;
  if(pel){document.querySelectorAll('#cl-pills .pll').forEach(p=>p.classList.remove('active'));pel.classList.add('active');}
  const q=(document.getElementById('cl-search').value||'').toLowerCase();
  const td=new Date().toISOString().split('T')[0];
  DB.ep.forEach(e=>{if(e.status==='active'&&e.expectedReturn&&e.expectedReturn<td)e.status='overdue';});
  const list=DB.ep.filter(e=>{
    const mq=!q||e.ur.includes(q)||e.surname.toLowerCase().includes(q)||e.address.toLowerCase().includes(q)||(e.firstname||'').toLowerCase().includes(q);
    const mc=cat==='all'||e.equipment.some(id=>{const eq=DB.eq.find(x=>x.id===id);return eq&&eq.cat===cat;});
    return mq&&mc;
  });
  const act=list.filter(e=>e.status!=='returned'),ret=list.filter(e=>e.status==='returned');
  let h='';
  if(act.length)h+=`<div class="st2" style="margin-bottom:7px">In Field (${act.length})</div>`+act.map(epH).join('');
  if(ret.length)h+=`<div class="st2" style="margin:13px 0 7px">Returned (${ret.length})</div>`+ret.map(epH).join('');
  if(!act.length&&!ret.length)h='<div class="empty"><div class="empty-icon">🏥</div><div class="empty-msg">No patient episodes yet. Tap "Issue Equipment to Patient" to create the first record.</div></div>';
  document.getElementById('ep-list').innerHTML=h;
}
function epH(ep){
  const ov=ep.status==='overdue',ret=ep.status==='returned';
  const days=Math.round((Date.now()-new Date(ep.issuedDate))/86400000);
  const tags=ep.equipment.map(id=>{const e=DB.eq.find(x=>x.id===id),ir=ep.itemReturns&&ep.itemReturns[id];return e?`<span class="eqtag ${ir?'eqbk':'eqout'}">${e.icon||'📦'} ${e.id}${ir?' ✓':''}</span>`:''}).join('');
  const allBk=ep.equipment.every(id=>ep.itemReturns&&ep.itemReturns[id]);
  return `<div class="epitem ${ov&&!ret?'od':''}" onclick="openEp('${ep.id}')">
    <div class="ephdr"><div style="flex:1;min-width:0"><div class="eppt">${ep.surname}${ep.firstname?', '+ep.firstname:''}</div><div class="epur">UR: ${ep.ur}</div><div class="epad">📍 ${ep.address}</div></div>
    <div style="text-align:right;flex-shrink:0;margin-left:8px">${ret||allBk?'<span class="bdg bgr">Returned</span>':ov?'<span class="bdg brd">⚠ Overdue</span>':'<span class="bdg bcl">In Field</span>'}<div style="font-size:.57rem;color:var(--mu);margin-top:3px">${days}d</div></div></div>
    <div class="epeq">${tags}</div><div class="epft"><div class="epst">👤 ${ep.staff}</div><div class="epdt">Due: ${ep.expectedReturn||'—'}</div></div></div>`;
}

const SB={'Available':'bgr','In Field':'bcl','Maintenance':'bwn','In Storage':'bbl'};
function filterEq(){
  const q=(document.getElementById('eq-s').value||'').toLowerCase(),s=document.getElementById('eq-sf').value;
  const list=DB.eq.filter(e=>(e.name.toLowerCase().includes(q)||e.id.toLowerCase().includes(q)||e.cat.toLowerCase().includes(q))&&(!s||e.status===s));
  if(!list.length){document.getElementById('eq-list').innerHTML='<div class="empty"><div class="empty-icon">🔧</div><div class="empty-msg">No equipment registered. Tap "Register New Equipment" below.</div></div>';return;}
  document.getElementById('eq-list').innerHTML=list.map(e=>`<div class="ai2" onclick="openEqD('${e.id}')"><div class="aiic">${e.icon||'📦'}</div><div class="aiinf"><div class="ainm">${e.name}</div><div class="aime">${e.id} · ${e.cat} · ${e.location||'No location'}</div></div><span class="bdg ${SB[e.status]||''}">${e.status}</span></div>`).join('');
}

function renderSF(){
  if(!DB.sf.length){document.getElementById('sf-list').innerHTML='<div class="empty"><div class="empty-icon">👤</div><div class="empty-msg">No staff added yet. Add staff members so they appear in the issue dropdown.</div></div>';return;}
  document.getElementById('sf-list').innerHTML=DB.sf.map(s=>{
    const out=DB.ep.filter(e=>(e.status==='active'||e.status==='overdue')&&e.staff===s.display).length;
    return `<div class="ai2"><div class="aiic" style="background:linear-gradient(135deg,#7c3aed,var(--ac));color:#fff;font-size:.76rem;font-weight:700">${ini(s.display)}</div><div class="aiinf"><div class="ainm">${s.display}</div><div class="aime">${s.role||'Staff'} · ${s.email||'No email'}</div></div><span class="bdg ${out?'bcl':'bgr'}">${out?out+' out':'Clear'}</span></div>`;
  }).join('');
}

function renderCatS(){
  document.getElementById('cat-list').innerHTML=DB.ct.map((c,i)=>`<div style="display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--bd)"><span style="font-size:1rem">${c.icon}</span><span style="flex:1;font-size:.8rem">${c.name}</span><span style="font-size:.66rem;color:var(--mu)">${DB.eq.filter(e=>e.cat===c.name).length} items</span><span style="color:var(--dg);cursor:pointer;font-size:.78rem" onclick="rmCat(${i})">✕</span></div>`).join('');
}

async function addCat(){const icon=document.getElementById('nc-icon').value.trim(),name=document.getElementById('nc-name').value.trim();if(!icon||!name){showToast('Icon and name required','warn');return;}if(DB.ct.find(c=>c.name===name)){showToast('Category exists','warn');return;}DB.ct.push({icon,name});await SS(KEYS.ct,DB.ct);document.getElementById('nc-icon').value='';document.getElementById('nc-name').value='';renderCatS();popCatDd();showToast('Category added','ok');}
async function rmCat(i){DB.ct.splice(i,1);await SS(KEYS.ct,DB.ct);renderCatS();popCatDd();showToast('Category removed','ok');}

function popSfDd(id='iss-stf'){const el=document.getElementById(id);if(!el)return;el.innerHTML='<option value="">— Select staff member —</option>'+DB.sf.map(s=>`<option value="${s.display}">${s.display}${s.role?' — '+s.role:''}</option>`).join('');}
function popCatDd(){const el=document.getElementById('ae-cat');if(!el)return;el.innerHTML=DB.ct.map(c=>`<option value="${c.name}">${c.icon} ${c.name}</option>`).join('');}

function openIssue(){
  const d=new Date();d.setDate(d.getDate()+1);document.getElementById('iss-ret').value=d.toISOString().split('T')[0];
  ['iss-ur','iss-sn','iss-fn','iss-addr','iss-notes'].forEach(id=>document.getElementById(id).value='');
  const av=DB.eq.filter(e=>e.status==='Available'),grid=document.getElementById('iss-eq'),none=document.getElementById('iss-none');
  if(!av.length){grid.innerHTML='';none.style.display='block';}
  else{none.style.display='none';grid.innerHTML=av.map(e=>`<div class="eqchk" onclick="this.classList.toggle('sel')" data-id="${e.id}"><span style="font-size:.9rem">${e.icon||'📦'}</span><div><div class="eqchn">${e.name}</div><div class="eqchid">${e.id}</div></div></div>`).join('');}
  popSfDd();OM('m-issue');
}
async function submitIssue(){
  const ur=document.getElementById('iss-ur').value.trim(),sn=document.getElementById('iss-sn').value.trim(),fn=document.getElementById('iss-fn').value.trim(),addr=document.getElementById('iss-addr').value.trim(),staff=document.getElementById('iss-stf').value;
  const eq=[...document.querySelectorAll('#iss-eq .eqchk.sel')].map(el=>el.dataset.id);
  if(!ur||!sn||!addr){showToast('UR, surname and address required','warn');return;}
  if(!staff){showToast('Select a staff member','warn');return;}
  if(!eq.length){showToast('Select at least one piece of equipment','warn');return;}
  const ep={id:'EP'+Date.now(),ur,surname:sn,firstname:fn,address:addr,equipment:eq,issuedDate:new Date().toISOString(),expectedReturn:document.getElementById('iss-ret').value,returnedDate:null,staff,itemReturns:{},notes:document.getElementById('iss-notes').value,status:'active'};
  DB.ep.unshift(ep);eq.forEach(id=>{const e=DB.eq.find(x=>x.id===id);if(e)e.status='In Field';});
  await SS(KEYS.ep,DB.ep);await SS(KEYS.eq,DB.eq);
  await addAct(`📤 <strong>${eq.length} item(s)</strong> issued to <strong>${sn}${fn?', '+fn:''}</strong> (UR ${ur}) by ${staff}`,'var(--cl)');
  txToday++;RA();renderCPills();CM('m-issue');showToast('Equipment issued to '+sn,'ok');
}

function openEp(id){
  const ep=DB.ep.find(x=>x.id===id);if(!ep)return;
  const allBk=ep.equipment.every(id=>ep.itemReturns&&ep.itemReturns[id]),ret=ep.status==='returned'||allBk;
  document.getElementById('ep-mt').textContent=`${ep.surname}${ep.firstname?', '+ep.firstname:''}`;
  document.getElementById('ep-ms').textContent=`UR: ${ep.ur}`;
  const eqRows=ep.equipment.map(id=>{
    const e=DB.eq.find(x=>x.id===id),ir=ep.itemReturns&&ep.itemReturns[id];if(!e)return'';
    return `<div class="ritem ${ir?'done sel':''}" id="ri-${id}" data-id="${id}"><div style="font-size:1.1rem;flex-shrink:0">${e.icon||'📦'}</div><div style="flex:1"><div style="font-weight:600;font-size:.8rem">${e.name}</div><div class="mono" style="color:var(--ac);margin-top:1px">${e.id}</div><div style="font-size:.66rem;margin-top:2px;color:${ir?'var(--ac3)':'var(--cl)'}">${ir?`✅ Returned ${shortD(ir.date)} · ${ir.staff}`:'⬤ Currently in field'}</div></div><div class="rcb" id="rcb-${id}">${ir?`<svg fill="none" viewBox="0 0 24 24" stroke="#10b981" stroke-width="3" width="12" height="12"><polyline points="20 6 9 17 4 12"/></svg>`:''}</div></div>`;
  }).join('');
  const ov=ep.status==='overdue';
  document.getElementById('ep-body').innerHTML=`
    ${ov&&!ret?`<div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);border-radius:7px;padding:8px;margin-bottom:10px;font-size:.74rem;color:var(--dg)">⚠️ <strong>Overdue.</strong> Expected: ${ep.expectedReturn}</div>`:''}
    <div class="card" style="background:var(--sf2);padding:11px;margin-bottom:10px"><table style="width:100%;font-size:.73rem;border-collapse:collapse">
      ${[['UR',`<span style="font-family:'Space Mono',monospace;color:var(--cl)">${ep.ur}</span>`],['Patient',`<strong>${ep.surname}${ep.firstname?', '+ep.firstname:''}</strong>`],['Address',ep.address],['Issued',shortD(ep.issuedDate)],['Expected return',`<span style="color:${ov&&!ret?'var(--dg)':'inherit'}">${ep.expectedReturn||'—'}</span>`],['Staff',`<span style="color:var(--ac)">${ep.staff}</span>`],['Notes',ep.notes||'—']].map(([k,v])=>`<tr><td style="color:var(--mu);padding:4px 0;width:36%;vertical-align:top">${k}</td><td style="padding:4px 0">${v}</td></tr>`).join('')}
    </table></div>
    ${!ret?`<div class="st2" style="margin-bottom:7px">Record Returns — tap to select</div>${eqRows}
    <div class="fg" style="margin-top:10px"><label class="fl">Returned By *</label><select class="fs" id="ret-sf"></select></div>
    <div class="fg"><label class="fl">Return Notes</label><input class="fi" id="ret-nt" placeholder="Condition, damage notes…"></div>
    <div style="display:flex;gap:6px;margin-top:3px"><button class="btn btng" style="flex:1;margin:0" onclick="retSel('${ep.id}')"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>Return Selected</button><button class="btn btnp" style="flex:1;margin:0" onclick="retAll('${ep.id}')">Return All</button></div>`
    :`${eqRows}<div class="bdg bgr" style="display:inline-block;padding:5px 12px;font-size:.74rem;margin-top:9px">✅ All returned${ep.returnedDate?' '+shortD(ep.returnedDate):''}${ep.returnedBy?' · '+ep.returnedBy:''}</div>`}`;
  if(!ret){ep.equipment.forEach(id=>{const ir=ep.itemReturns&&ep.itemReturns[id];if(!ir){const el=document.getElementById('ri-'+id);if(el)el.addEventListener('click',()=>{el.classList.toggle('sel');const cb=document.getElementById('rcb-'+id);if(el.classList.contains('sel')){cb.innerHTML='<svg fill="none" viewBox="0 0 24 24" stroke="var(--ac)" stroke-width="3" width="12" height="12"><polyline points="20 6 9 17 4 12"/></svg>';cb.style.background='rgba(0,229,255,.15)';cb.style.borderColor='var(--ac)';}else{cb.innerHTML='';cb.style.background='';cb.style.borderColor='';}});}});popSfDd('ret-sf');}
  OM('m-ep');
}
async function retSel(epId){const ep=DB.ep.find(x=>x.id===epId);if(!ep)return;const sf=document.getElementById('ret-sf')?.value;if(!sf){showToast('Select returning staff member','warn');return;}const sel=[...document.querySelectorAll('.ritem.sel:not(.done)')].map(el=>el.dataset.id);if(!sel.length){showToast('Tap items above to select','warn');return;}await doRet(ep,sel,sf);}
async function retAll(epId){const ep=DB.ep.find(x=>x.id===epId);if(!ep)return;const sf=document.getElementById('ret-sf')?.value;if(!sf){showToast('Select returning staff member','warn');return;}const toRet=ep.equipment.filter(id=>!(ep.itemReturns&&ep.itemReturns[id]));await doRet(ep,toRet,sf);}
async function doRet(ep,ids,staff){
  const now=new Date().toISOString();if(!ep.itemReturns)ep.itemReturns={};
  ids.forEach(id=>{ep.itemReturns[id]={date:now,staff};const e=DB.eq.find(x=>x.id===id);if(e)e.status='Available';});
  const allBk=ep.equipment.every(id=>ep.itemReturns[id]);
  if(allBk){ep.status='returned';ep.returnedDate=now;ep.returnedBy=staff;}
  await SS(KEYS.ep,DB.ep);await SS(KEYS.eq,DB.eq);
  await addAct(`📥 <strong>${ids.length} item(s)</strong> returned from <strong>${ep.surname}</strong> (UR ${ep.ur}) by ${staff}`,'var(--ac3)');
  txToday++;RA();filterEp(CCF,null);CM('m-ep');showToast(`${ids.length} item(s) returned · ${staff}`,'ok');
}

function openAddEq(){['ae-nm','ae-id','ae-loc','ae-ser','ae-nt'].forEach(id=>document.getElementById(id).value='');document.getElementById('ae-pd').value='';document.getElementById('ae-sd').value='';document.getElementById('ae-st').value='Available';popCatDd();OM('m-aeq');}
async function submitAEq(){
  const nm=document.getElementById('ae-nm').value.trim(),id=document.getElementById('ae-id').value.trim().toUpperCase(),cat=document.getElementById('ae-cat').value;
  if(!nm||!id||!cat){showToast('Name, ID and category required','warn');return;}
  if(DB.eq.find(e=>e.id===id)){showToast('Asset ID '+id+' already exists','warn');return;}
  const co=DB.ct.find(c=>c.name===cat)||{icon:'📦'};
  DB.eq.unshift({id,name:nm,cat,icon:co.icon,status:document.getElementById('ae-st').value,location:document.getElementById('ae-loc').value,serial:document.getElementById('ae-ser').value,purchaseDate:document.getElementById('ae-pd').value,serviceDate:document.getElementById('ae-sd').value,notes:document.getElementById('ae-nt').value,registeredDate:new Date().toISOString()});
  await SS(KEYS.eq,DB.eq);await addAct(`🔧 <strong>${nm} ${id}</strong> registered · ${cat}`,'var(--ac)');
  RA();CM('m-aeq');showToast(nm+' registered','ok');
}

function openEqD(id){
  const e=DB.eq.find(x=>x.id===id);if(!e)return;
  const ep=e.status==='In Field'?DB.ep.find(ep=>ep.equipment.includes(id)&&ep.status!=='returned'):null;
  document.getElementById('eqd-t').textContent=e.name;
  document.getElementById('eqd-b').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px">
      <div class="card" style="margin:0;padding:9px;background:var(--sf2)"><div style="font-size:.63rem;color:var(--mu)">Asset ID</div><div class="mono" style="color:var(--ac);margin-top:2px">${e.id}</div></div>
      <div class="card" style="margin:0;padding:9px;background:var(--sf2)"><div style="font-size:.63rem;color:var(--mu)">Status</div><div style="margin-top:3px"><span class="bdg ${SB[e.status]||''}">${e.status}</span></div></div>
    </div>
    ${ep?`<div style="background:var(--cdim);border:1px solid var(--cborder);border-radius:7px;padding:8px;margin-bottom:9px;font-size:.73rem;color:var(--cl)">🏥 With <strong>${ep.surname}${ep.firstname?', '+ep.firstname:''}</strong> (UR ${ep.ur})<br>📍 ${ep.address}<br>👤 ${ep.staff}</div>`:''}
    <div class="card" style="background:var(--sf2);padding:11px;margin-bottom:9px"><table style="width:100%;font-size:.72rem;border-collapse:collapse">
      ${[['Category',e.cat],['Location',e.location||'—'],['Serial',e.serial||'—'],['Purchase Date',shortD(e.purchaseDate)||'—'],['Next Service',shortD(e.serviceDate)||'—'],['Notes',e.notes||'—']].map(([k,v])=>`<tr><td style="color:var(--mu);padding:4px 0;width:38%">${k}</td><td style="padding:4px 0">${v}</td></tr>`).join('')}
    </table></div>
    <div style="display:flex;gap:6px"><button class="btn btnc" style="flex:1;margin:0" onclick="CM('m-eqd');openIssueForEq('${e.id}')">Issue to Patient</button><button class="btn btnd" style="flex:1;margin:0" onclick="CM('m-eqd');togMaint('${e.id}')">${e.status==='Maintenance'?'Mark Available':'Flag Maintenance'}</button></div>
    <button class="btn btnd" style="margin-top:6px" onclick="delEq('${e.id}')"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>Delete Equipment Record</button>`;
  OM('m-eqd');
}
function openIssueForEq(id){openIssue();setTimeout(()=>{const el=document.querySelector(`#iss-eq [data-id="${id}"]`);if(el)el.classList.add('sel');},100);}
async function togMaint(id){const e=DB.eq.find(x=>x.id===id);if(!e)return;e.status=e.status==='Maintenance'?'Available':'Maintenance';await SS(KEYS.eq,DB.eq);await addAct(`🔧 <strong>${e.name} ${e.id}</strong> → ${e.status}`,e.status==='Maintenance'?'var(--wn)':'var(--ac3)');RA();showToast(e.id+' marked '+e.status,'ok');}
async function delEq(id){if(!confirm('Delete '+id+'? Cannot be undone.'))return;DB.eq=DB.eq.filter(e=>e.id!==id);await SS(KEYS.eq,DB.eq);CM('m-eqd');RA();showToast('Equipment deleted','ok');}

function openAddSf(){['sf-fn','sf-ln','sf-rl','sf-em'].forEach(id=>document.getElementById(id).value='');OM('m-sf');}
async function submitSf(){
  const fn=document.getElementById('sf-fn').value.trim(),ln=document.getElementById('sf-ln').value.trim();
  if(!fn||!ln){showToast('First and last name required','warn');return;}
  const disp=fn.charAt(0)+'. '+ln;
  if(DB.sf.find(s=>s.display===disp)){showToast('Staff member exists','warn');return;}
  DB.sf.push({display:disp,firstname:fn,lastname:ln,role:document.getElementById('sf-rl').value,email:document.getElementById('sf-em').value});
  await SS(KEYS.sf,DB.sf);CM('m-sf');renderSF();popSfDd();showToast(disp+' added','ok');
}

async function sendAI(){
  const inp=document.getElementById('ai-in');const msg=inp.value.trim();if(!msg)return;inp.value='';
  addAIM('user',msg);AIH.push({role:'user',content:msg});
  const tid='t'+Date.now();document.getElementById('ai-msgs').insertAdjacentHTML('beforeend',`<div class="aimsg bot" id="${tid}"><div class="aiav">AI</div><div class="aibub"><div class="tdots"><span></span><span></span><span></span></div></div></div>`);scAI();
  const ctx=`Equipment (${DB.eq.length}): ${DB.eq.slice(0,30).map(e=>`[${e.id}] ${e.name} ${e.cat} ${e.status}`).join('; ')}. Episodes (${DB.ep.length}): ${DB.ep.slice(0,20).map(e=>`UR:${e.ur} ${e.surname} ${e.status} equip:${e.equipment.join(',')} staff:${e.staff} due:${e.expectedReturn}`).join('; ')}. Staff: ${DB.sf.map(s=>s.display).join(', ')}. Today: ${new Date().toISOString().split('T')[0]}.`;
  try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:`You are AssetPulse AI for a Community Nursing Service. Be concise (2-4 sentences), clinically practical. Reference specific IDs, UR numbers, staff. Today: ${new Date().toISOString().split('T')[0]}. Data: ${ctx}`,messages:AIH})});
    const d=await res.json();document.getElementById(tid)?.remove();
    const r=d.content?.map(b=>b.text||'').join('')||'No response.';addAIM('bot',r);AIH.push({role:'assistant',content:r});
  }catch{document.getElementById(tid)?.remove();addAIM('bot','⚠️ Connection error.');}
}
function addAIM(role,text){document.getElementById('ai-msgs').insertAdjacentHTML('beforeend',`<div class="aimsg ${role}">${role==='bot'?'<div class="aiav">AI</div>':''}<div class="aibub">${text}</div></div>`);scAI();}
function scAI(){const el=document.getElementById('ai-msgs');el.scrollTop=el.scrollHeight;}
function qAI(p){document.getElementById('ai-in').value=p;sendAI();SP('ai',document.querySelectorAll('.tab')[4]);}

async function exportData(){const d={equipment:DB.eq,episodes:DB.ep,staff:DB.sf,categories:DB.ct,exportedAt:new Date().toISOString()};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='assetpulse-'+new Date().toISOString().split('T')[0]+'.json';a.click();URL.revokeObjectURL(u);showToast('Data exported','ok');}
async function clrData(){if(!confirm('Permanently delete ALL data?'))return;DB={eq:[],ep:[],sf:[],ct:DCATS,ac:[]};await SS(KEYS.eq,[]);await SS(KEYS.ep,[]);await SS(KEYS.sf,[]);await SS(KEYS.ct,DCATS);await SS(KEYS.ac,[]);RA();showToast('All data cleared','warn');}

function SP(id,tabEl){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>{t.classList.remove('active');t.classList.remove('acl');});document.getElementById('page-'+id).classList.add('active');if(tabEl){tabEl.classList.add('active');if(id==='clinical')tabEl.classList.add('acl');}if(id==='clinical'){renderCPills();filterEp(CCF,null);RS();}if(id==='equipment')filterEq();if(id==='staff')renderSF();if(id==='settings')renderCatS();}
function OM(id){document.getElementById(id).classList.add('open');}
function CM(id){document.getElementById(id).classList.remove('open');}
function S(id,v){const el=document.getElementById(id);if(el)el.textContent=v;}
function ini(n){return(n||'').split(' ').map(p=>p.replace('.','').charAt(0)).join('').toUpperCase().slice(0,2);}
function shortD(s){if(!s)return'';try{return new Date(s).toLocaleDateString('en-NZ',{day:'2-digit',month:'short',year:'numeric'});}catch{return s;}}
function relT(ts){try{const d=(Date.now()-new Date(ts))/1000;if(d<60)return'Just now';if(d<3600)return Math.floor(d/60)+'m ago';if(d<86400)return Math.floor(d/3600)+'h ago';return Math.floor(d/86400)+'d ago';}catch{return'';}}
let tT;
function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=(type==='ok'?'✅ ':type==='warn'?'⚠️ ':'ℹ️ ')+msg;t.className='toast show '+type;clearTimeout(tT);tT=setTimeout(()=>t.className='toast',3000);}
document.querySelectorAll('.mback').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');}));
boot();
</script>
</body>
</html>
